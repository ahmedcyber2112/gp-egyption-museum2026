# Netlify: Site settings → Build & deploy → Base directory can stay empty;
# this file sets base = "frontend" for the Next.js app.
[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_API_BASE_URL = "https://muesum-a252b23f7b32.herokuapp.com"
  NEXT_INTERNAL_API_BASE_URL = "https://muesum-a252b23f7b32.herokuapp.com"

[[plugins]]
  package = "@netlify/plugin-nextjs"
