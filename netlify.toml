# Netlify: Site settings → Build & deploy → Base directory can stay empty;
# this file sets base = "frontend" for the Next.js app.
[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_API_BASE_URL = "https://museum-a252b23f7b32.herokuapp.com"
  NEXT_INTERNAL_API_BASE_URL = "https://museum-a252b23f7b32.herokuapp.com"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Fallback proxy if Next rewrite is not applied on Netlify edge.
[[redirects]]
  from = "/api-proxy/*"
  to = "https://museum-a252b23f7b32.herokuapp.com/:splat"
  status = 200
  force = true
