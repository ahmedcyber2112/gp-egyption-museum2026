# Use when Netlify "Base directory" is set to `frontend`.
[build]
  command = "npm ci && npm run build"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_API_BASE_URL = "https://muesum-a252b23f7b32.herokuapp.com"
  NEXT_INTERNAL_API_BASE_URL = "https://muesum-a252b23f7b32.herokuapp.com"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "/api-proxy/*"
  to = "https://muesum-a252b23f7b32.herokuapp.com/:splat"
  status = 200
  force = true
